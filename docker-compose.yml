# ═══════════════════════════════════════════════════════
# ToukrichteMed Landing Page
# ═══════════════════════════════════════════════════════
#
# Uses the shared Traefik from creatifpro (creatif-network).
# No second Traefik needed.
#
# LOCAL DEV:    docker compose up -d
#               → http://localhost:4001
#
# PRODUCTION:   docker compose up -d
#               → https://toukrichtemed.com (via creatifpro Traefik)
# ═══════════════════════════════════════════════════════

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toukrichtemed24_web
    restart: unless-stopped
    ports:
      - "4001:80"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=creatif-network"
      # HTTPS
      - "traefik.http.routers.toukrichtemed-secure.rule=Host(`toukrichtemed.com`) || Host(`www.toukrichtemed.com`)"
      - "traefik.http.routers.toukrichtemed-secure.entrypoints=websecure"
      - "traefik.http.routers.toukrichtemed24-secure.tls=true"
      - "traefik.http.routers.toukrichtemed24-secure.tls.certresolver=letsencrypt"
      - "traefik.http.services.toukrichtemed24.loadbalancer.server.port=80"
      # www → non-www redirect
      - "traefik.http.middlewares.toukrichtemed24-www.redirectregex.regex=^https://www\\.toukrichtemed\\.com/(.*)"
      - "traefik.http.middlewares.toukrichtemed24-www.redirectregex.replacement=https://toukrichtemed.com/$${1}"
      - "traefik.http.middlewares.toukrichtemed24-www.redirectregex.permanent=true"
      - "traefik.http.routers.toukrichtemed24-secure.middlewares=toukrichtemed24-www"
    networks:
      - creatif-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

networks:
  creatif-network:
    external: true
